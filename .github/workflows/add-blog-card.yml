name: Add Blog Card

on:
  repository_dispatch:
    types: [add-blog-card]

jobs:
  add-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Configure git
        run: |
          git config user.email "theglowwellcollective@gmail.com"
          git config user.name "The Glow Well Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Run add-blog-card script
        run: node add-blog-card.js "${{ github.event.client_payload.filename }}" "${{ github.event.client_payload.title }}"
